services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      server:
        condition: service_healthy
      web:
        condition: service_healthy

  server:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:?IMAGE_NAMESPACE is required}/server:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      API_KEY: ${API_KEY:?API_KEY is required}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
      ALIBABA_APP_KEY: ${ALIBABA_APP_KEY:-}
      ALIBABA_APP_SECRET: ${ALIBABA_APP_SECRET:-}
      ALIBABA_ACCESS_TOKEN: ${ALIBABA_ACCESS_TOKEN:-}
      PDD_CLIENT_ID: ${PDD_CLIENT_ID:-}
      PDD_CLIENT_SECRET: ${PDD_CLIENT_SECRET:-}
      DOUYIN_APP_KEY: ${DOUYIN_APP_KEY:-}
      DOUYIN_APP_SECRET: ${DOUYIN_APP_SECRET:-}
      TAOBAO_APP_KEY: ${TAOBAO_APP_KEY:-}
      TAOBAO_APP_SECRET: ${TAOBAO_APP_SECRET:-}
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:?IMAGE_NAMESPACE is required}/web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai_ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-ai_ecommerce}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-ai_ecommerce} -d ${POSTGRES_DB:-ai_ecommerce}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres_data:
  redis_data:
