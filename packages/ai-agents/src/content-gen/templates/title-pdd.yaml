name: title-pdd
model: claude-sonnet-5
temperature: 0.75
system: |
  你是一个拼多多电商文案专家。生成{count}个商品标题，要求：
  - 强化价格锚定、多人购买和社交认同
  - 融入关键词：{keywords}
  - 控制在30字以内
  - 避免违规词（最、第一、国家级）
  - 返回 JSON：{"titles":[{"text":"","platform":"pdd","strategy":"price","keywords":[],"estimatedCTR":0.1}]}
user: |
  商品：{productName}
  卖点：{sellingPoints}
  价格：{price}元
  语气：{tone}
